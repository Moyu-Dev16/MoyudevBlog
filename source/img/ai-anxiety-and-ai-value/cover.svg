<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI 焦虑，和 AI 真正适合做什么</title>
  <desc id="desc">一张关于 AI 降低想法验证成本的博客封面图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="0.52" stop-color="#e8f2ef"/>
      <stop offset="1" stop-color="#f7e8df"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7faf8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1f2933" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="90" fill="#f0a36e" opacity="0.2"/>
  <circle cx="130" cy="555" r="115" fill="#2b8c83" opacity="0.16"/>
  <path d="M0 570 C190 510 305 650 505 595 C685 546 753 404 938 445 C1050 470 1136 566 1200 520 L1200 675 L0 675 Z" fill="#ffffff" opacity="0.46"/>

  <g filter="url(#softShadow)">
    <rect x="86" y="78" width="1028" height="520" rx="34" fill="url(#panel)" opacity="0.96"/>
  </g>

  <g transform="translate(135 130)">
    <text x="0" y="0" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="62" font-weight="800" fill="#1e2a32">AI 焦虑</text>
    <text x="0" y="74" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="46" font-weight="700" fill="#2b8c83">和 AI 真正适合做什么</text>
    <rect x="2" y="105" width="430" height="6" rx="3" fill="#f0a36e"/>
    <text x="0" y="166" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="25" fill="#53636b">不是替你做决定，而是降低“试一试”的成本</text>
  </g>

  <g transform="translate(140 375)">
    <rect x="0" y="0" width="225" height="96" rx="20" fill="#fff7ec" stroke="#f0a36e" stroke-width="2"/>
    <text x="36" y="39" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b3d1f">一个想法</text>
    <text x="36" y="70" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" fill="#8b684d">还不知道值不值得做</text>

    <path d="M248 48 L318 48" stroke="#6f7f86" stroke-width="4" stroke-linecap="round"/>
    <path d="M318 48 L303 36 M318 48 L303 60" stroke="#6f7f86" stroke-width="4" stroke-linecap="round"/>

    <rect x="347" y="-20" width="230" height="136" rx="26" fill="#e8f6f3" stroke="#2b8c83" stroke-width="2"/>
    <circle cx="407" cy="48" r="31" fill="#2b8c83"/>
    <text x="391" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">AI</text>
    <text x="458" y="39" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#1f5f59">先做粗胚</text>
    <text x="458" y="72" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" fill="#48756f">把想法快速落地</text>

    <path d="M600 48 L670 48" stroke="#6f7f86" stroke-width="4" stroke-linecap="round"/>
    <path d="M670 48 L655 36 M670 48 L655 60" stroke="#6f7f86" stroke-width="4" stroke-linecap="round"/>

    <rect x="700" y="0" width="235" height="96" rx="20" fill="#f2f4f1" stroke="#78856d" stroke-width="2"/>
    <text x="738" y="39" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#394536">人来判断</text>
    <text x="738" y="70" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" fill="#687160">继续打磨，或者放下</text>
  </g>
</svg>
