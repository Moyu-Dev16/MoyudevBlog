<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI 降低验证成本</title>
  <desc id="desc">把模糊想法快速做成原型，再由人判断是否继续投入。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eaf5f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#20313a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <text x="70" y="82" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="38" font-weight="800" fill="#22313a">AI 做的不是替你决定</text>
  <text x="70" y="124" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="24" fill="#607078">而是把“试一下”的成本降下来</text>

  <g transform="translate(75 195)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="215" rx="26" fill="#ffffff"/>
    <circle cx="54" cy="55" r="25" fill="#f0a36e" opacity="0.92"/>
    <text x="91" y="62" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#2b2f32">模糊想法</text>
    <text x="36" y="120" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">脑子里大概有个方向</text>
    <text x="36" y="154" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">但还没想清楚</text>
  </g>

  <path d="M325 305 L405 305" stroke="#738088" stroke-width="5" stroke-linecap="round"/>
  <path d="M405 305 L389 292 M405 305 L389 318" stroke="#738088" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(435 175)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="255" rx="30" fill="#ffffff"/>
    <rect x="32" y="32" width="186" height="64" rx="18" fill="#e6f4f1"/>
    <text x="72" y="73" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#2b8c83">AI</text>
    <text x="114" y="72" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#235f5a">粗胚</text>
    <text x="36" y="137" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">先写初稿</text>
    <text x="36" y="169" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">先跑脚本</text>
    <text x="36" y="201" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">先做原型</text>
  </g>

  <path d="M715 305 L795 305" stroke="#738088" stroke-width="5" stroke-linecap="round"/>
  <path d="M795 305 L779 292 M795 305 L779 318" stroke="#738088" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(825 195)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="215" rx="26" fill="#ffffff"/>
    <circle cx="58" cy="55" r="25" fill="#78856d" opacity="0.95"/>
    <text x="95" y="62" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#2b2f32">人的判断</text>
    <text x="38" y="120" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">有价值：继续投入</text>
    <text x="38" y="154" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#66757c">没意思：及时放下</text>
  </g>

  <g transform="translate(245 500)">
    <rect x="0" y="0" width="710" height="58" rx="29" fill="#24343b"/>
    <text x="48" y="37" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="21" fill="#ffffff">重点不是“AI 替我完成一切”，而是“我更敢开始试错”。</text>
  </g>
</svg>
