# Butterfly theme config
# Docs: https://butterfly.js.org/

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-heart

index_img: /img/site/top-bg.jpg
default_top_img: /img/site/top-bg.jpg
archive_img: /img/site/top-bg.jpg
tag_img: /img/site/top-bg.jpg
category_img: /img/site/top-bg.jpg

avatar:
  img: /img/avatar.jpg
  effect: false

social:
  fab fa-github: https://github.com/Moyu-Dev16 || Github

aside:
  enable: true
  card_author:
    enable: true
    description: 技术、与日常折腾
    button:
      enable: true
      icon: fab fa-github
      text: Github
      link: https://github.com/Moyu-Dev16
  card_announcement:
    enable: true
    content: 记录技术实践、开发踩坑和一些认真生活的片段。

subtitle:
  enable: false

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

footer:
  owner:
    enable: true
    since: 2026
  custom_text:

inject:
  head:
    - <meta name="baidu-site-verification" content="codeva-BrFw8rG3Ka" />
    # - <meta name="example" content="head inject placeholder">
    # 后续广告、统计、验证代码可放这里
  bottom:
    # - <script src="/js/example.js"></script>
    # 后续广告 JS、统计 JS 可放这里
